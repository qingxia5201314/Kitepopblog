server {
    listen 80;
    listen [::]:80;
    server_name dreamhunter2333.com www.dreamhunter2333.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://dreamhunter2333.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dreamhunter2333.com;

    ssl_certificate /etc/letsencrypt/live/dreamhunter2333.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamhunter2333.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://dreamhunter2333.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dreamhunter2333.com;

    ssl_certificate /etc/letsencrypt/live/dreamhunter2333.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dreamhunter2333.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/myblog;
    client_max_body_size 0;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/rss+xml
        application/xml
        font/woff2
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Enable only after installing nginx-module-brotli.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types application/javascript application/json application/xml font/woff2 image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options DENY always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Add only after HTTPS has been stable and all subdomains are ready.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
